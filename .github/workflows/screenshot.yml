name: Take Screenshot
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Puppeteer
        run: npm install puppeteer
      - name: Take screenshot
        run: |
          node -e "
          const puppeteer = require('puppeteer');
          (async () => {
            const browser = await puppeteer.launch({args: ['--no-sandbox']});
            const page = await browser.newPage();
            await page.setViewport({width: 600, height: 1200});
            await page.goto('https://dr09psycholog-lang.github.io/endocrine-rehab-app/', {waitUntil: 'networkidle2', timeout: 60000});
            await page.screenshot({path: 'screenshot_600x1200.png', fullPage: false});
            await browser.close();
            console.log('Done');
          })();
          "
      - name: Commit and push
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add screenshot_600x1200.png
          git commit -m "Add real screenshot 600x1200" || echo "Nothing to commit"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
