name: Download Screenshot
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download screenshot 600x1200
        run: |
          curl -L --max-time 60 "https://image.thum.io/get/width/600/viewportWidth/600/viewportHeight/1200/https://dr09psycholog-lang.github.io/endocrine-rehab-app/" -o screenshot_600x1200.png
          ls -la screenshot_600x1200.png
      - name: Commit and push
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add screenshot_600x1200.png
          git commit -m "Add screenshot 600x1200" || echo "Nothing to commit"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
