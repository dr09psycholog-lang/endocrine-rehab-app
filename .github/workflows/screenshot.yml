name: Take Screenshots
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Puppeteer
        run: npm install puppeteer
      - name: Write script
        run: |
          cat > take_screenshots.js << 'JSEOF'
          const puppeteer = require('puppeteer');
          (async () => {
            const browser = await puppeteer.launch({args: ['--no-sandbox']});
            const page = await browser.newPage();
            await page.setViewport({width: 600, height: 1200});
            const url = 'https://dr09psycholog-lang.github.io/endocrine-rehab-app/';
            await page.goto(url, {waitUntil: 'networkidle2', timeout: 60000});
            await page.screenshot({path: 'screenshot_600x1200.png', fullPage: false});
            const btns = await page.$$('button');
            for (const b of btns) {
              const t = await page.evaluate(el => el.textContent.trim(), b);
              if (t === '\u0418\u0441\u0442\u043e\u0440\u0438\u044f') { await b.click(); break; }
            }
            await new Promise(r => setTimeout(r, 1000));
            await page.screenshot({path: 'screenshot2_600x1200.png', fullPage: false});
            const btns2 = await page.$$('button');
            for (const b2 of btns2) {
              const t2 = await page.evaluate(el => el.textContent.trim(), b2);
              if (t2 === '\u0417\u0430\u0431\u043e\u043b\u0435\u0432\u0430\u043d\u0438\u044f') { await b2.click(); break; }
            }
            await new Promise(r => setTimeout(r, 1000));
            await page.screenshot({path: 'screenshot3_600x1200.png', fullPage: false});
            await browser.close();
            console.log('Done');
          })();
          JSEOF
      - name: Take screenshots
        run: node take_screenshots.js
      - name: Commit and push
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add screenshot_600x1200.png screenshot2_600x1200.png screenshot3_600x1200.png
          git commit -m "Add 3 screenshots" || echo "Nothing to commit"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
